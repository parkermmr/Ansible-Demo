---
- name: URI Check Playbook
  hosts: nodes
  become: false

  tasks:
    - name: Check URI is reachable
      uri:
        url: "http://{{ ansible_host }}:8080/health"
        method: GET
        status_code: 200
      register: uri_result

    - name: Display URI result
      debug:
        msg:
          - "Status: {{ uri_result.status }}"
          - "URL: {{ uri_result.url }}"