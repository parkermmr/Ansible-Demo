---
- name: URI Check Playbook
  hosts: nodes
  become: false

  tasks:
    - name: Check URI is reachable
      uri:
        url: "http://{{ ansible_host }}:8080/api"
        method: POST
        body_format: json
        body:
          key: value
        status_code: 201
      register: uri_result

    - name: Display URI result
      debug:
        msg:
          - "Status: {{ uri_result.status }}"
          - "URL: {{ uri_result.url }}"